sonar.projectKey=benpate_uri
sonar.organization=benpate


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=uri
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Go test coverage, produced by the build workflow before the scan runs.
sonar.go.coverage.reportPaths=coverage.out

# Exclude test files from coverage measurement (they are the tests, not the SUT).
sonar.coverage.exclusions=**/*_test.go
